name: CI

# Security + quality gates for every change. Maps to CASA / OWASP ASVS controls:
#   - V1/V14 secure SDLC + dependency management (bun audit, Dependabot)
#   - SAST (Semgrep: secrets, OWASP Top Ten, JS/TS)
#   - automated test + typecheck on every PR
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - name: Typecheck
        run: bunx tsc --noEmit
      - name: Unit tests
        run: bun run test
      # Schema drift gate: replays the migrations and asserts the
      # insert_folder_example_encrypted RPC only writes columns that still
      # exist on folder_examples. Catches column mismatches (Postgres 42703)
      # before deploy. Also covered by "Unit tests" above; kept as a named,
      # required step so the failure is obvious in the PR checks.
      - name: Schema consistency (folder_examples RPC)
        run: bun run test:schema
      # Regression gate for the in-person meeting transcript pipeline. Runs the
      # STT sanitizer golden-output snapshots plus the iOS-recording finalizer
      # regression. Fails the PR if the sanitizer output changes unexpectedly
      # (e.g. a runaway hallucination loop slips through, or normal speech gets
      # mangled). Update intentionally with: bun run test:meetings-transcript:update
      - name: Meetings transcript regression
        run: bun run test:meetings-transcript
      # Enforced: the codebase is ESLint-clean (0 errors, 0 warnings). Keep it
      # that way — lint failures block the PR.
      - name: Lint
        run: bun run lint --max-warnings=0

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      # Gate on production dependencies. Dev-only advisories (e.g. build/lint
      # tooling) are tracked via Dependabot but don't block deploys.
      - name: Audit production dependencies
        run: bun audit --prod

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      # Pinned for reproducible, tamper-resistant scans (avoid moving :latest).
      image: semgrep/semgrep:1.164.0
    steps:
      - uses: actions/checkout@v7
      - name: Semgrep scan
        run: >
          semgrep scan
          --config p/secrets
          --config p/owasp-top-ten
          --config p/javascript
          --config p/typescript
          --metrics=off
          --error
          src
